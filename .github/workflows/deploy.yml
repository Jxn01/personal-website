name: deploy to github pages

# JXN-000 ships itself. Push to the default branch → static build → Pages.
# When the custom domain (jxn.ddns.net) is ready, drop BASE_PATH and point
# SITE at it — nothing else changes.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one live deploy at a time; let an in-flight run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history → real commit hash in the status readout

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # enables Pages (source: GitHub Actions) on first run — no manual toggle
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: pnpm install --frozen-lockfile

      - name: build
        env:
          # project site lives at jxn01.github.io/personal-website/
          BASE_PATH: /personal-website
          SITE: https://jxn01.github.io
        run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
